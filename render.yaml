services:
  - type: web
    name: reviewlens-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reviewlens-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: ABLY_ANONYMOUS_TOKEN
        sync: false

databases:
  - name: reviewlens-db
    databaseName: reviewlens
    plan: free
